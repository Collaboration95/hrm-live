name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Check
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/hrm-live-matplotlib
        run: make PYTHON=python check

  macos-bundle:
    name: macOS bundle smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev,build]"
      - name: Quality gate
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/hrm-live-matplotlib
        run: make PYTHON=python check
      - name: Build ad-hoc bundle
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/hrm-live-matplotlib
        run: make PYTHON=python build
      - name: Verify ad-hoc bundle metadata
        run: make PYTHON=python verify-bundle
